<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- ゲーム内テキスト共通の丸ゴシックWebフォント（src/config/ui.ts の FONT_FAMILY と対応） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Dropping</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Phaser が生成する canvas を中央寄せ（autoCenter は NO_CENTER 側にする） */
      #game canvas {
        display: block;
        margin: auto;
      }

      /* 横向き時に表示する「縦にしてね」オーバーレイ */
      #rotate-notice {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a1a2e;
        color: #ffffff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'M PLUS Rounded 1c', sans-serif;
        text-align: center;
        gap: 18px;
      }
      #rotate-notice .icon {
        font-size: 64px;
        animation: rotate-hint 1.6s ease-in-out infinite;
      }
      #rotate-notice .msg {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 0.05em;
      }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-90deg); }
      }
      /* 横向き（かつタッチ端末想定の小さめ画面）でオーバーレイを表示 */
      @media (orientation: landscape) and (max-height: 600px) {
        #rotate-notice { display: flex; }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cr2aq-by.js"></script>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-notice">
      <div class="icon">📱</div>
      <div class="msg">縦向きでプレイしてください</div>
    </div>
  </body>

</html>
